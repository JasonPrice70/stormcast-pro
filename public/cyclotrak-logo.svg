<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 160" width="660" height="160">
  <defs>
    <radialGradient id="eyeGlowTrans" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.9" />
      <stop offset="40%" style="stop-color:#0080cc;stop-opacity:0.5" />
      <stop offset="100%" style="stop-color:#003366;stop-opacity:0" />
    </radialGradient>

    <linearGradient id="band1Trans" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#0057a8;stop-opacity:0.4" />
    </linearGradient>

    <filter id="glowTrans" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softGlowTrans" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- NO background — fully transparent -->

  <!-- ─────────────────────── ICON ─────────────────────── -->

  <circle cx="80" cy="80" r="60" fill="url(#eyeGlowTrans)" opacity="0.25"/>

  <!-- Band 1 -->
  <path d="M 80 20 C 120 18, 148 48, 145 82 C 142 112, 118 135, 88 138 C 60 140, 36 124, 28 100"
        fill="none" stroke="url(#band1Trans)" stroke-width="7" stroke-linecap="round"
        filter="url(#glowTrans)" opacity="0.85"/>

  <!-- Band 2 -->
  <path d="M 80 32 C 112 30, 134 56, 132 84 C 130 108, 112 126, 88 128 C 66 130, 48 116, 42 96"
        fill="none" stroke="#0099dd" stroke-width="5.5" stroke-linecap="round" opacity="0.75"/>

  <!-- Band 3 -->
  <path d="M 80 44 C 104 43, 120 62, 118 83 C 116 102, 103 116, 86 118 C 70 120, 58 109, 54 95"
        fill="none" stroke="#00bbff" stroke-width="4" stroke-linecap="round" opacity="0.8"/>

  <!-- Band 4 -->
  <path d="M 80 54 C 97 53, 108 67, 107 82 C 106 96, 96 106, 84 108 C 73 109, 65 101, 62 91"
        fill="none" stroke="#00d4ff" stroke-width="3" stroke-linecap="round" opacity="0.9"/>

  <!-- Counter bands -->
  <path d="M 28 80 C 26 58, 42 38, 62 30 C 76 24, 90 24, 104 30"
        fill="none" stroke="#0077bb" stroke-width="5" stroke-linecap="round" opacity="0.5"/>
  <path d="M 35 90 C 32 70, 46 52, 64 44 C 76 38, 90 37, 102 43"
        fill="none" stroke="#0088cc" stroke-width="3.5" stroke-linecap="round" opacity="0.55"/>

  <!-- Eye wall -->
  <circle cx="80" cy="80" r="18" fill="none" stroke="#00d4ff" stroke-width="3"
          opacity="0.7" filter="url(#glowTrans)"/>

  <!-- Eye center -->
  <circle cx="80" cy="80" r="10" fill="#001833" opacity="0.85"/>
  <circle cx="80" cy="80" r="10" fill="none" stroke="#00eeff" stroke-width="1.5"
          opacity="0.9" filter="url(#softGlowTrans)"/>
  <circle cx="80" cy="80" r="4" fill="#00d4ff" opacity="0.95" filter="url(#softGlowTrans)"/>
  <circle cx="80" cy="80" r="2" fill="#ffffff" opacity="1"/>

  <!-- ─────────────────────── WORDMARK ─────────────────────── -->

  <text x="162" y="85"
        font-family="'Arial Black', 'Impact', sans-serif"
        font-size="52"
        font-weight="900"
        letter-spacing="8">
    <tspan fill="#e8f4ff">CYCLO</tspan><tspan fill="#00d4ff" filter="url(#glowTrans)">TRAK</tspan>
  </text>

  <!-- Tagline -->
  <text x="163" y="118"
        font-family="'Helvetica Neue', 'Helvetica', 'Arial', sans-serif"
        font-size="22"
        font-weight="bold"
        letter-spacing="4"
        fill="#4a9abb"
        opacity="0.9">HURRICANE TRACKING SYSTEM</text>

  <!-- Accent line -->
  <line x1="163" y1="128" x2="638" y2="128"
        stroke="#00d4ff" stroke-width="0.75" opacity="0.3"/>

  <!-- Dot accent -->
  <circle cx="155" cy="116" r="2.5" fill="#00d4ff" opacity="0.6"/>
</svg>
